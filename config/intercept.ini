[base]
env_name = intercept

[vec]
total_agents = 1024
num_buffers = 1
num_threads = 1

[env]
# DroneTask enum: idle=0,hover=1,orbit=2,follow=3,cube=4,congo=5,flag=6,race=7,intercept=8
task = 8
num_drones = 1
max_rings = 0

# unused hover-task fields, kept for binding compat
alpha_dist = 0.0
alpha_hover = 0.0
alpha_shaping = 0.0
alpha_omega = 0.0
hover_target_dist = 30.0
hover_dist = 0.1
hover_omega = 0.1
hover_vel = 0.1

# intercept task — Thales/Gavin 2026 Table I
lambda_catch = 10.0
lambda_dist = 0.001
lambda_fail = 30.0
lambda_cmd = 2e-4

r_intercept = 0.5
evader_dist_min = 4.0
evader_dist_max = 10.0
evader_speed_min = 0.5
evader_speed_max = 3.0

[policy]
hidden_size = 256
num_layers = 2
expansion_factor = 1

# Paper Table II PPO hyperparameters.
[train]
gpus = 1
seed = 42
total_timesteps = 50000000
learning_rate = 5e-4
anneal_lr = 0
min_lr_ratio = 0
gamma = 0.99
gae_lambda = 0.95
replay_ratio = 1.0
clip_coef = 0.2
vf_coef = 0.5
vf_clip_coef = 0.2
max_grad_norm = 0.5
ent_coef = 0.01
beta1 = 0.9
beta2 = 0.999
eps = 1e-8
minibatch_size = 8192
horizon = 128
vtrace_rho_clip = 1.0
vtrace_c_clip = 1.0
prio_alpha = 0.0
prio_beta0 = 1.0
