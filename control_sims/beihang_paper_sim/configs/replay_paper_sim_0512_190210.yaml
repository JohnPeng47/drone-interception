base_scenario: red_balloon_x500.yaml

description: >
  Replay the historical paper_sim_0512_190210 seeds using k_1=1.0 and no
  initial pitch offset. The expected misses come from the recorded run.

sim:
  backend: puffer_c

seeds: [1, 2, 3]

vehicle:
  initial_pitch_offset_deg: 0.0

controller:
  gains:
    k_1: 1.0

perception:
  pixel_noise_std_px: [1.0, 1.0]

expected:
  1:
    miss_distance_m: 1.34581805001
  2:
    miss_distance_m: 1.34398564408
  3:
    miss_distance_m: 1.31358854071
